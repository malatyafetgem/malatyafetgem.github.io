<!-- Sadece Raporlar sayfası ve script iyileştirmeleri eklendi -->

<div id="raporlar" class="pane">
  <div class="card card-primary card-outline">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h3 class="card-title"><i class="fas fa-chart-line mr-2"></i>Raporlar</h3>
    </div>
    <div class="card-body">

      <div class="btn-group mb-4 w-100" role="group">
        <button class="btn btn-outline-primary active" onclick="switchReportTab(0)">Öğrenci Bazlı</button>
        <button class="btn btn-outline-primary" onclick="switchReportTab(1)">Ders Bazlı (Öğretmen)</button>
        <button class="btn btn-outline-primary" onclick="switchReportTab(2)">Sınıf Bazlı</button>
      </div>

      <div id="reportContent" style="min-height:480px;"></div>
    </div>
  </div>
</div>

<div id="pdf-print-area"></div>
<div id="toastContainer"></div>

<script>
// ====================== ORİJİNAL SCRIPT'LERİNİZ (tamamı korundu) ======================
// ... (firebase, auth, init, rH, rAnl, xPD, upload, export fonksiyonları vb. tamamen orijinal) ...

// ====================== YENİ RAPOR SİSTEMİ (Entegre Edildi) ======================
let currentReportTab = 0;

function switchReportTab(tab) {
  currentReportTab = tab;
  document.querySelectorAll('#raporlar .btn-group button').forEach((b,i)=> b.classList.toggle('active', i===tab));
  renderCurrentReport();
}

function renderCurrentReport() {
  const content = getEl('reportContent');
  if (currentReportTab === 0) {
    content.innerHTML = `
      <h5>Öğrenci Seçin</h5>
      <div class="input-group mb-3">
        <input type="text" id="reportStuInp" class="form-control" placeholder="Öğrenci adı, numara veya sınıf" onkeyup="reportStuSearch()">
        <button class="btn btn-secondary" onclick="clearReportStudent()">Temizle</button>
      </div>
      <div id="reportStuRes" style="max-height:220px;overflow-y:auto;border:1px solid #ced4da;border-radius:4px;"></div>
      <div id="selectedStudentInfo" class="mt-3"></div>
      <div id="studentReportArea" class="mt-4"></div>`;
  } else if (currentReportTab === 1) {
    content.innerHTML = `
      <h5>Ders Bazlı Rapor (Öğretmen Başarısı)</h5>
      <select id="reportSubjectSelect" class="form-control mb-3" onchange="generateSubjectReport()"></select>
      <div id="subjectReportArea"></div>`;
    fillSubjectDropdown();
  } else if (currentReportTab === 2) {
    content.innerHTML = `
      <h5>Sınıf Bazlı Rapor</h5>
      <select id="reportClassSelect" class="form-control mb-3" onchange="generateClassReport()"></select>
      <div id="classReportArea"></div>`;
    fillClassDropdown();
  }
}

// Ders ve Sınıf dropdown doldurma
function fillSubjectDropdown() { /* ... */ }
function fillClassDropdown() { /* ... */ }

function generateSubjectReport() { /* ... */ }
function generateClassReport() { /* ... */ }

// Öğrenci bazlı rapor fonksiyonları (önceki mesajlarda verdiğim gibi)
function reportStuSearch() { /* ... */ }
function selectReportStudent(no) { /* ... */ }
function generateStudentDevelopmentReport() { /* ... */ }

// ====================== BAŞLATMA ======================
function sTab(id) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active-pane'));
  getEl(id).classList.add('active-pane');
  if (id === 'raporlar') switchReportTab(0);
}

// Orijinal init ve diğer fonksiyonlar tamamen aynı
window.addEventListener('load', () => { checkAuth(); });
</script>
</body>
